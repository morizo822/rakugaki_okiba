<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>漫画ビューア</title>
  <style>
    body { background-color: #1a1a1a; color: white; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
    
    /* 漫画表示エリア */
    .manga-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .manga-container {
      position: relative;
      display: flex;
      flex-direction: row-reverse;
      height: 100%;
      max-width: 100%;
    }

    .manga-image {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .img-hidden { display: none !important; }

    /* UI要素（初期状態は非表示） */
    .ui-overlay {
      position: fixed;
      width: 100%;
      z-index: 100;
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    .ui-visible { opacity: 1; pointer-events: auto; }

    nav { top: 0; background-color: rgba(51, 51, 51, 0.8); padding: 15px 0; text-align: center; }
    nav a { color: white; text-decoration: none; font-size: 14px; margin: 0 15px; }

    .controls-bottom { bottom: 0; background-color: rgba(0, 0, 0, 0.6); padding: 20px 0; text-align: center; }

    #fullscreen-btn {
      background: #444;
      color: white;
      border: 1px solid #666;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .page-info { font-size: 0.9em; color: #ccc; }

    /* クリックエリア（UIの表示/非表示用） */
    .center-touch {
      position: absolute;
      top: 20%;
      left: 30%;
      width: 40%;
      height: 60%;
      z-index: 50;
    }

    /* 左右クリックめくり */
    .side-touch { position: absolute; top: 0; height: 100%; width: 30%; z-index: 40; }
    .next-area { left: 0; }
    .prev-area { right: 0; }

    @media (orientation: portrait) and (max-width: 768px) {
      .manga-container { width: 100%; }
      .manga-image { width: 100%; height: auto; }
    }
  </style>
</head>
<body onclick="toggleUI()">

<nav id="nav-ui" class="ui-overlay">
  <a href="manga-list.html">一覧に戻る</a>
</nav>

<div class="manga-wrapper" id="viewer">
  <div class="manga-container">
    <img id="manga-image-right" class="manga-image" src="" alt="">
    <img id="manga-image-left" class="manga-image" src="" alt="">

    <div class="side-touch next-area" onclick="event.stopPropagation(); changePage(true)"></div>
    <div class="center-touch"></div>
    <div class="side-touch prev-area" onclick="event.stopPropagation(); changePage(false)"></div>
  </div>
</div>

<div id="footer-ui" class="ui-overlay controls-bottom">
  <button id="fullscreen-btn" onclick="event.stopPropagation(); toggleFullscreen()">全画面表示</button>
  <div class="page-info">
    <span id="current-page">1</span> / <span id="total-pages">0</span>
  </div>
</div>

<script>
  const images = [
    "https://lh3.googleusercontent.com/d/1ddWchYmWGrKiByxywtfWP0QzjKMFFRjN", // こんびに_001.jpg
"https://lh3.googleusercontent.com/d/10cXzmTAo_4da4DqcIBL-vl9qjNy3yO8l", // こんびに_002.jpg
"https://lh3.googleusercontent.com/d/1jDahuvS-rcRYBFKdwaiRt68msUS-A5df", // こんびに_003.jpg
"https://lh3.googleusercontent.com/d/1iQ-2LBoCC5SiGeWGV9wt_QYr5ipwbodW", // こんびに_004.jpg
"https://lh3.googleusercontent.com/d/1PN9wgncBy1YZNsSlcZsvSA7oi3yd3CtN", // こんびに_005.jpg
"https://lh3.googleusercontent.com/d/1IFx1DE4bZ0tPiFrU1jO9RADaCCHIemtd", // こんびに_006.jpg
"https://lh3.googleusercontent.com/d/1vCCCz2pEKyKAbPP-MoFnnncwSA2cfFpf", // こんびに_007.jpg
"https://lh3.googleusercontent.com/d/1w0UnOiNnTj9qyLf_cLdseF50FuYVA3zh", // こんびに_008.jpg
"https://lh3.googleusercontent.com/d/1Y2piBQJctHmrs9y2R1nk1dTPQzFDP6E5", // こんびに_009.jpg
"https://lh3.googleusercontent.com/d/1wlLzoaojvFjUc_v77lcKja-mbtnxhREN", // こんびに_010.jpg
"https://lh3.googleusercontent.com/d/1TcGG22jErItffwfvEqsUkpC8tEgQyyKY", // こんびに_011.jpg
"https://lh3.googleusercontent.com/d/1HjKpJjB9PzH-G1l99yv-eQZXVuM21mes", // こんびに_012.jpg
"https://lh3.googleusercontent.com/d/1-0QP7g9Woq3Nx922htpnmrvdHtsMD-Tz", // こんびに_013.jpg
"https://lh3.googleusercontent.com/d/1gm-3AWGEIHUYOg-OwyhV-bosBncEuaWk", // こんびに_014.jpg
"https://lh3.googleusercontent.com/d/13QzU5hJXYTay_aNxTKXgYKFIlvBxyxp1", // こんびに_015.jpg
"https://lh3.googleusercontent.com/d/1FpOgooIYHZpelPUG5TWpmwmTQrv2aDS9", // こんびに_016.jpg
"https://lh3.googleusercontent.com/d/19_vc-SX8mkqskVx4Wgel5iUN93hSBwMK", // こんびに_017.jpg
"https://lh3.googleusercontent.com/d/1PkXK8gkzA-rjBDAVFZWVjsSIleKM3jbb", // こんびに_018.jpg
  ];

  let currentIndex = 0;
  let uiTimer;
  const imgRight = document.getElementById("manga-image-right");
  const imgLeft = document.getElementById("manga-image-left");
  const pageText = document.getElementById("current-page");
  document.getElementById("total-pages").innerText = images.length;

  // ① UIの表示切り替え
  function toggleUI() {
    const nav = document.getElementById("nav-ui");
    const footer = document.getElementById("footer-ui");
    
    nav.classList.add("ui-visible");
    footer.classList.add("ui-visible");

    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
      nav.classList.remove("ui-visible");
      footer.classList.remove("ui-visible");
    }, 5000); // 5秒後に自動で隠す
  }

  // ② 全画面表示ボタン
  function toggleFullscreen() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
      el.requestFullscreen().catch(err => alert("全画面表示に失敗しました"));
    } else {
      document.exitFullscreen();
    }
  }

  function updateDisplay() {
    const isLandscape = window.innerWidth > window.innerHeight;
    if (currentIndex === 0) {
      imgLeft.src = images[0];
      imgLeft.classList.remove("img-hidden");
      imgRight.classList.add("img-hidden");
      pageText.innerText = "1";
    } else {
      if (isLandscape) {
        imgRight.src = images[currentIndex];
        imgRight.classList.remove("img-hidden");
        if (currentIndex + 1 < images.length) {
          imgLeft.src = images[currentIndex + 1];
          imgLeft.classList.remove("img-hidden");
          pageText.innerText = (currentIndex + 1) + "-" + (currentIndex + 2);
        } else {
          imgLeft.classList.add("img-hidden");
          pageText.innerText = (currentIndex + 1);
        }
      } else {
        imgLeft.src = images[currentIndex];
        imgLeft.classList.remove("img-hidden");
        imgRight.classList.add("img-hidden");
        pageText.innerText = (currentIndex + 1);
      }
    }
  }

  function changePage(isNext) {
    const isLandscape = window.innerWidth > window.innerHeight;
    if (isNext) {
      if (currentIndex === 0) { currentIndex = 1; }
      else {
        const step = isLandscape ? 2 : 1;
        if (currentIndex + step >= images.length) { alert("最後のページです"); location.href = "manga-list.html"; return; }
        currentIndex += step;
      }
    } else {
      if (currentIndex <= 1) { currentIndex = 0; }
      else { currentIndex -= (isLandscape ? 2 : 1); }
    }
    updateDisplay();
  }

  // ③ スマホのスワイプ操作
  let touchStartX = 0;
  let touchEndX = 0;

  document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, false);

  document.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  }, false);

  function handleSwipe() {
    const swipeThreshold = 50;
    if (touchEndX < touchStartX - swipeThreshold) {
      changePage(true); // 左スワイプで進む
    }
    if (touchEndX > touchStartX + swipeThreshold) {
      changePage(false); // 右スワイプで戻る
    }
  }

  updateDisplay();
  window.addEventListener('resize', updateDisplay);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') changePage(true);
    if (e.key === 'ArrowRight') changePage(false);
  });
</script>
</body>
</html>
