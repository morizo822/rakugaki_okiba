<div id="latest-section">

    読み込み中...

</div>

<script>
  // すでにあるGASのURLを使用
  const gasImageApiUrl = "https://script.google.com/macros/s/AKfycbw-8jJEdKzQCMLz1N-zBu7RDPAsLLbCUVH7jmBSOxijQZxPKmqh1nJNKbUyFs4I0um8/exec";

  async function loadImages() {
    try {
      const response = await fetch(gasImageApiUrl);
      const data = await response.json();

      const container = document.getElementById('latest-image-container');
      
      if (data.latest) {
        // 画像を表示。max-widthとmax-heightでサイズを抑え、onclickで拡大機能を呼ぶ
        container.innerHTML = `
          <div class="art-work" style="display: inline-block; cursor: pointer;" onclick="openImage(this.querySelector('img'))">
            <img src="${data.latest.url}" alt="${data.latest.name}" 
                 style="max-width: 600px; max-height: 400px; width: auto; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
            <p style="margin-top: 10px; font-weight: bold;">${data.latest.name}</p>
          </div>
        `;
      } else {
        container.innerHTML = "<p>画像が見つかりません。</p>";
      }
    } catch (e) {
      console.error("読み込みエラー:", e);
      container.innerHTML = "<p>エラーが発生しました。</p>";
    }
  }

  // ページ読み込み時に実行
  loadImages();
</script>

<div style="display: flex; align-items: center; gap: 15px;">

<div id="commentList" style="margin-top: 15px;">読み込み中...</div>

<script>
// 【重要】新しいデプロイで発行された最新のURL（末尾が /exec のもの）を貼り付けてください
const gasUrl = "https://script.google.com/macros/s/AKfycbwb9UFHfEIBzC-mKJfAqb1VE0teqc9hgMhiV7f4JMDFgIJnHZzMqowDpjF9iEBqR3_A/exec";


function openImage(imgElement) {
  const overlay = document.getElementById("imageOverlay");
  const fullImg = document.getElementById("fullImage");
  
  fullImg.src = imgElement.src; // クリックした画像のURLをコピー
  overlay.style.display = "flex"; // 隠していた枠を表示する
}

// 閉じるときの関数
function closeImage() {
  document.getElementById("imageOverlay").style.display = "none";
}



window.onload = function() {
  loadComments();
};

// 1. データを送信する関数
async function sendData() {
  const name = document.getElementById("userName").value;
  const comment = document.getElementById("userComment").value;

  if (!name || !comment) {
    alert("なまえとコメントを入力してね！");
    return;
  }

  const data = { name: name, comment: comment };

  try {
    await fetch(gasUrl, {
      method: "POST",
      mode: "no-cors", 
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    
    alert("送信しました！");
    location.reload(); 
    
  } catch (error) {
    console.error("エラー:", error);
    alert("通信に失敗しました。");
  }
}

// 2. データを読み込んで表示する関数
async function loadComments() {
  const listContainer = document.getElementById("commentList");
  const countDisplay = document.getElementById("accessCount"); 
  
  listContainer.innerHTML = "読み込み中..."; 

  try {
    const response = await fetch(gasUrl);
    const result = await response.json();

    if (result.counter !== undefined) {
      countDisplay.innerText = result.counter;
    }

    listContainer.innerHTML = ""; 

    if (!result.comments || result.comments.length === 0) {
      listContainer.innerHTML = "<p>まだコメントはありません。</p>";
      return;
    }

    function escapeHtml(str) {
      // コメントが数字（37564など）の場合でも文字列に変換して処理するように修正
      const stringStr = String(str || "");
      return stringStr.replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    result.comments.forEach(item => {
      const div = document.createElement("div");
      div.className = "art-work";
      div.style.display = "block";
      div.style.marginBottom = "10px";
      
      const date = new Date(item.date).toLocaleString();
      const safeName = escapeHtml(item.name);
      const safeComment = escapeHtml(item.comment);
      
      div.innerHTML = `
        <p style="font-size: 0.8em; color: #666;">${date} - <strong>${safeName}</strong> さん</p>
        <p>${safeComment.replace(/\n/g, '<br>')}</p>
      `;
      listContainer.appendChild(div);
    });
  } catch (error) {
    console.error("読み込みエラー:", error);
    listContainer.innerHTML = "<p>コメントの読み込みに失敗しました。</p>";
  }
}
</script>
