<html>
<head>
<link href="style.css" rel="stylesheet" type="text/css">
<title>過去の作品 - ラクガキ置き場</title>
<style>
  /* ギャラリーを綺麗に整列させるためのスタイル */
  .image-grid {
    display: flex;
    flex-wrap: wrap; 
    gap: 20px;       
    justify-content: center; 
    padding: 20px;
  }

  .image-grid .art-card {
    width: 300px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
  }

  .image-grid img {
    width: 100%;
    height: 200px;   
    object-fit: cover; 
    border-radius: 4px;
    transition: transform 0.3s ease;
  }

  .image-grid img:hover {
    transform: scale(1.05);
  }

  /* 投稿日ラベルのスタイル */
  .date-label {
    margin-top: 10px;
    font-size: 0.85em;
    color: #666;
    display: block;
    font-weight: bold;
  }

  @media (max-width: 600px) {
    .image-grid .art-card {
      width: 45%; 
    }
    .image-grid img {
      height: 150px;
    }
  }
</style>
</head>

<body>

<div id="imageOverlay" onclick="closeImage()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); z-index: 2000; cursor: zoom-out; justify-content: center; align-items: center;">
  <img id="fullImage" style="max-width: 90%; max-height: 90%; border: 3px solid white;">
</div>

<h1 class="logo-container">
  <img src="z/taitoru_logo.JPG" alt="ラクガキ置き場" width="1260">
</h1>

<nav style="background-color: #333; padding: 15px 0; text-align: center; margin-bottom: 20px;">
  <a href="index.html" style="color: white; margin: 0 20px; text-decoration: none; font-weight: bold;">ホーム</a>
  <a href="archive.html" style="color: white; margin: 0 20px; text-decoration: none; font-weight: bold;">過去の作品集</a>
  <a href="manga-list.html" style="color: white; margin: 0 20px; text-decoration: none; font-weight: bold;">漫画</a>
</nav>

<h2 style="text-align: center;">これまでに描いた絵</h2>

<div class="archive-section">
  <h2 class="date-title" style="margin-left: 20px;">最近のラクガキ</h2>
  <div id="auto-archive-grid" class="image-grid">
    <p>読み込み中...</p>
  </div>
</div>

<hr>

<div class="archive-section">
  <h2 class="date-title" style="margin-left: 20px;">2023年頃</h2>
  <div class="image-grid">
    <div class="art-card">
      <img src="z/messageImage_1713147487318.jpg" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
      <span class="date-label">2023年投稿</span>
    </div>
    <div class="art-card">
      <img src="z/nekonekonejkonejko.png" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
      <span class="date-label">2023年投稿</span>
    </div>
    <div class="art-card">
      <img src="z/ssdfghjbg.png" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
      <span class="date-label">2023年投稿</span>
    </div>
    <div class="art-card">
      <img src="z/ｷﾞｬﾗｸﾃｶスーパーネッコ.png" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
      <span class="date-label">2023年投稿</span>
    </div>
    <div class="art-card">
      <img src="z/スーパーオメガカブトムシZ.png" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
      <span class="date-label">2023年投稿</span>
    </div>
  </div>
</div>

<hr>
<p style="text-align: center;"><a href="index.html">ホームへ戻る</a></p>

<script>
const gasImageApiUrl = "https://script.google.com/macros/s/AKfycbzTwWU4J7GvFgMLpWgFYcPpR_TFxHrxXIeb29gw8ZUkHGKVAEH_eDVhHixKoGAVKmlv/exec";

async function loadArchiveImages() {
  const grid = document.getElementById('auto-archive-grid');
  try {
    const response = await fetch(gasImageApiUrl);
    const data = await response.json();

    if (data.archive && data.archive.length > 0) {
      grid.innerHTML = data.archive.map(item => {
        // GASから送られてきた数値を日付形式に変換
        const timestamp = item.date || item.updated;
        const dateStr = timestamp ? new Date(timestamp).toLocaleDateString() : "日付不明";
        
        return `
          <div class="art-card">
            <img src="${item.url}" alt="art" onclick="openImage(this)" style="cursor: zoom-in;">
            <span class="date-label">${dateStr} 更新</span>
          </div>
        `;
      }).join('');
    } else {
      grid.innerHTML = "<p>過去の自動更新画像はありません。</p>";
    }
  } catch (e) {
    console.error("読み込みエラー:", e);
    grid.innerHTML = "<p>読み込みに失敗しました。</p>";
  }
}



function openImage(imgElement) {
  const overlay = document.getElementById("imageOverlay");
  const fullImg = document.getElementById("fullImage");
  fullImg.src = imgElement.src;
  overlay.style.display = "flex";
}

function closeImage() {
  document.getElementById("imageOverlay").style.display = "none";
}

window.onload = loadArchiveImages;
</script>

</body>
</html>
